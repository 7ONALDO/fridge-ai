<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1400" font-family="'Pretendard', 'Malgun Gothic', sans-serif">
  <defs>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3F2FD;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#BBDEFB;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F3E5F5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#E1BEE7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="storageGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFF3E0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FFE0B2;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ECEFF1;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#CFD8DC;stop-opacity:1"/>
    </linearGradient>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#455A64"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#455A64"/>
    </marker>
    <marker id="arrowRight" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#455A64"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="2" dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="1400" fill="#FAFAFA"/>
  
  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="28" font-weight="700" fill="#1A237E">시스템 아키텍처 — Layered Architecture</text>
  <text x="600" y="75" text-anchor="middle" font-size="16" fill="#546E7A">냉장고 AI: 이미지 기반 재료 인식 및 레시피 추천 End-to-End 시스템</text>
  
  <!-- ============================================= -->
  <!-- STEP 1: 먼저 모든 박스(레이어·컴포넌트) 그리기 -->
  <!-- ============================================= -->
  
  <!-- Layer 1: Client Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="110" width="1000" height="95" rx="12" fill="url(#clientGrad)" stroke="#1976D2" stroke-width="2"/>
  </g>
  <text x="130" y="145" font-size="18" font-weight="700" fill="#0D47A1">① Client Layer</text>
  <text x="130" y="170" font-size="15" fill="#263238">Streamlit Web UI</text>
  <text x="130" y="190" font-size="13" fill="#455A64">(이미지 업로드 / 재료 확인 / 필터 선택 / 레시피 상세 화면)</text>
  <rect x="920" y="130" width="160" height="55" rx="8" fill="#1976D2" opacity="0.15"/>
  <text x="1000" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#0D47A1">🖥️ 7 Screens</text>
  <text x="1000" y="173" text-anchor="middle" font-size="11" fill="#1976D2">User Interface</text>
  
  <!-- Layer 2: Application Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="250" width="1000" height="150" rx="12" fill="url(#appGrad)" stroke="#388E3C" stroke-width="2"/>
  </g>
  <text x="130" y="285" font-size="18" font-weight="700" fill="#1B5E20">② Application Layer — FastAPI</text>
  
  <!-- 4 Endpoints -->
  <rect x="130" y="305" width="210" height="75" rx="8" fill="#FFF" stroke="#388E3C" stroke-width="1.5"/>
  <text x="235" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">/predict</text>
  <text x="235" y="348" text-anchor="middle" font-size="11" fill="#388E3C">이미지 추론</text>
  <text x="235" y="365" text-anchor="middle" font-size="10" fill="#616161">POST multipart</text>
  
  <rect x="360" y="305" width="210" height="75" rx="8" fill="#FFF" stroke="#388E3C" stroke-width="1.5"/>
  <text x="465" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">/recipes</text>
  <text x="465" y="348" text-anchor="middle" font-size="11" fill="#388E3C">레시피 랭킹</text>
  <text x="465" y="365" text-anchor="middle" font-size="10" fill="#616161">GET query</text>
  
  <rect x="590" y="305" width="210" height="75" rx="8" fill="#FFF" stroke="#388E3C" stroke-width="1.5"/>
  <text x="695" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">/recipe/{id}</text>
  <text x="695" y="348" text-anchor="middle" font-size="11" fill="#388E3C">상세 조회</text>
  <text x="695" y="365" text-anchor="middle" font-size="10" fill="#616161">GET params</text>
  
  <rect x="820" y="305" width="210" height="75" rx="8" fill="#FFF" stroke="#388E3C" stroke-width="1.5"/>
  <text x="925" y="328" text-anchor="middle" font-size="14" font-weight="700" fill="#1B5E20">/scale</text>
  <text x="925" y="348" text-anchor="middle" font-size="11" fill="#388E3C">인분 조정</text>
  <text x="925" y="365" text-anchor="middle" font-size="10" fill="#616161">POST body</text>
  
  <!-- Layer 3: AI Core Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="460" width="1000" height="240" rx="12" fill="url(#aiGrad)" stroke="#7B1FA2" stroke-width="2"/>
  </g>
  <text x="130" y="495" font-size="18" font-weight="700" fill="#4A148C">③ AI Core Layer</text>
  
  <!-- Row 1: YOLOv11 → Normalizer → Ranker -->
  <rect x="130" y="515" width="220" height="85" rx="8" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="240" y="542" text-anchor="middle" font-size="15" font-weight="700" fill="#4A148C">🎯 YOLOv11</text>
  <text x="240" y="563" text-anchor="middle" font-size="12" fill="#6A1B9A">객체 탐지</text>
  <text x="240" y="583" text-anchor="middle" font-size="11" fill="#757575">30 classes</text>
  
  <rect x="400" y="515" width="220" height="85" rx="8" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="510" y="542" text-anchor="middle" font-size="15" font-weight="700" fill="#4A148C">🔄 재료 정규화</text>
  <text x="510" y="563" text-anchor="middle" font-size="12" fill="#6A1B9A">Normalizer</text>
  <text x="510" y="583" text-anchor="middle" font-size="11" fill="#757575">동의어 매핑</text>
  
  <rect x="670" y="515" width="220" height="85" rx="8" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="780" y="542" text-anchor="middle" font-size="15" font-weight="700" fill="#4A148C">🏆 레시피 랭킹</text>
  <text x="780" y="563" text-anchor="middle" font-size="12" fill="#6A1B9A">Ranker</text>
  <text x="780" y="583" text-anchor="middle" font-size="11" fill="#757575">Coverage 점수</text>
  
  <!-- Row 2: Pantry Classifier (좌) + Scaler (우) - 별도 모듈로 분리 -->
  <rect x="360" y="625" width="300" height="60" rx="8" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="510" y="650" text-anchor="middle" font-size="14" font-weight="700" fill="#4A148C">📦 Pantry Classifier</text>
  <text x="510" y="670" text-anchor="middle" font-size="11" fill="#757575">보유 / 추가구매 / pantry 3구간 분류</text>
  
  <rect x="720" y="625" width="300" height="60" rx="8" fill="#FFF" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="870" y="650" text-anchor="middle" font-size="14" font-weight="700" fill="#4A148C">⚖️ Scaler</text>
  <text x="870" y="670" text-anchor="middle" font-size="11" fill="#757575">재료 용량 비례 조정 (인분 스케일링)</text>
  
  <!-- Layer 4: Storage Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="760" width="1000" height="160" rx="12" fill="url(#storageGrad)" stroke="#F57C00" stroke-width="2"/>
  </g>
  <text x="130" y="795" font-size="18" font-weight="700" fill="#E65100">④ Storage Layer</text>
  
  <rect x="130" y="815" width="210" height="85" rx="8" fill="#FFF" stroke="#F57C00" stroke-width="1.5"/>
  <text x="235" y="845" text-anchor="middle" font-size="24">🎨</text>
  <text x="235" y="872" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">YOLO.pt</text>
  <text x="235" y="890" text-anchor="middle" font-size="11" fill="#757575">(weights)</text>
  
  <rect x="360" y="815" width="210" height="85" rx="8" fill="#FFF" stroke="#F57C00" stroke-width="1.5"/>
  <text x="465" y="845" text-anchor="middle" font-size="24">📊</text>
  <text x="465" y="872" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">recipes.csv</text>
  <text x="465" y="890" text-anchor="middle" font-size="11" fill="#757575">1,090건</text>
  
  <rect x="590" y="815" width="210" height="85" rx="8" fill="#FFF" stroke="#F57C00" stroke-width="1.5"/>
  <text x="695" y="845" text-anchor="middle" font-size="24">🔗</text>
  <text x="695" y="872" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">mapping.json</text>
  <text x="695" y="890" text-anchor="middle" font-size="11" fill="#757575">동의어 ~150쌍</text>
  
  <rect x="820" y="815" width="210" height="85" rx="8" fill="#FFF" stroke="#F57C00" stroke-width="1.5"/>
  <text x="925" y="845" text-anchor="middle" font-size="24">🧂</text>
  <text x="925" y="872" text-anchor="middle" font-size="14" font-weight="700" fill="#E65100">pantry.json</text>
  <text x="925" y="890" text-anchor="middle" font-size="11" fill="#757575">staple 목록</text>
  
  <!-- Docker Compose 박스 -->
  <rect x="430" y="930" width="340" height="40" rx="6" fill="#FFF" stroke="#455A64" stroke-width="1.5"/>
  <text x="600" y="957" text-anchor="middle" font-size="13" font-weight="600" fill="#37474F">🐳 Docker Compose: FastAPI + Streamlit 단일 스택</text>
  
  <!-- Layer 5: Infrastructure Layer -->
  <g filter="url(#shadow)">
    <rect x="100" y="985" width="1000" height="95" rx="12" fill="url(#infraGrad)" stroke="#546E7A" stroke-width="2"/>
  </g>
  <text x="130" y="1020" font-size="18" font-weight="700" fill="#263238">⑤ Infrastructure Layer</text>
  <text x="130" y="1045" font-size="15" fill="#37474F">Docker 기반 재현 가능한 배포 환경</text>
  <text x="130" y="1065" font-size="12" fill="#546E7A">1회 명령(`docker-compose up`)으로 전체 스택 실행</text>
  <rect x="900" y="1000" width="170" height="65" rx="8" fill="#546E7A" opacity="0.15"/>
  <text x="985" y="1025" text-anchor="middle" font-size="24">🐳</text>
  <text x="985" y="1050" text-anchor="middle" font-size="12" font-weight="600" fill="#263238">Docker Ready</text>
  
  <!-- ============================================= -->
  <!-- STEP 2: 그 다음에 모든 화살표 그리기 (박스 위에 올라감) -->
  <!-- ============================================= -->
  
  <!-- Arrow: Client ↔ App (라벨을 화살표 옆으로) -->
  <line x1="570" y1="210" x2="570" y2="242" stroke="#455A64" stroke-width="2.5" marker-end="url(#arrowDown)"/>
  <line x1="630" y1="248" x2="630" y2="215" stroke="#455A64" stroke-width="2.5" marker-end="url(#arrowUp)"/>
  
  <!-- Client ↔ App 라벨 (화살표 왼쪽/오른쪽) -->
  <rect x="360" y="218" width="195" height="22" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="457" y="234" text-anchor="middle" font-size="11" fill="#37474F">📤 이미지 파일 N장</text>
  <rect x="645" y="218" width="210" height="22" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="750" y="234" text-anchor="middle" font-size="11" fill="#37474F">📥 JSON: 재료·추천·상세</text>
  
  <!-- Arrows: App → AI Core (엔드포인트별로 담당 모듈로 직접 연결) -->
  <!-- /predict → YOLOv11 (Row 1 좌측, 수직) -->
  <line x1="235" y1="403" x2="235" y2="510" stroke="#455A64" stroke-width="2" marker-end="url(#arrowDown)"/>
  
  <!-- /recipes → Ranker (Row 1 우측, 대각선) -->
  <path d="M 465 403 Q 600 450 760 510" fill="none" stroke="#455A64" stroke-width="2" marker-end="url(#arrowDown)"/>
  
  <!-- /recipe/{id} → Pantry Classifier (Row 2 좌측, 대각선 Row 1 우회) -->
  <path d="M 695 403 Q 580 545 510 620" fill="none" stroke="#455A64" stroke-width="2" marker-end="url(#arrowDown)"/>
  
  <!-- /scale → Scaler (Row 2 우측, 대각선 Row 1 우회) -->
  <path d="M 925 403 Q 950 545 870 620" fill="none" stroke="#455A64" stroke-width="2" marker-end="url(#arrowDown)"/>
  
  <!-- App → AI 라벨 (각 화살표 옆에 배치) -->
  <!-- /predict → YOLOv11 -->
  <rect x="245" y="430" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="292" y="444" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">numpy array</text>
  
  <!-- /recipes → Ranker -->
  <rect x="480" y="430" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="527" y="444" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">재료 + 필터</text>
  
  <!-- /recipe/{id} → Pantry -->
  <rect x="605" y="430" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="652" y="444" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">recipe_id</text>
  
  <!-- /scale → Scaler -->
  <rect x="935" y="430" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="982" y="444" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">id + 새 인분</text>
  
  <!-- Arrows: AI Core 내부 수평 (YOLOv11 → Normalizer → Ranker) -->
  <line x1="355" y1="558" x2="392" y2="558" stroke="#455A64" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="625" y1="558" x2="662" y2="558" stroke="#455A64" stroke-width="2" marker-end="url(#arrowRight)"/>
  
  <!-- Ranker → Row 2 실선 제거됨: Pantry와 Scaler는 각자 /recipe/{id}, /scale 엔드포인트에서 독립 호출 -->
  
  
  <!-- Arrows: AI Core → Storage (점선, 각 모듈이 실제 접근하는 저장소로 연결) -->
  <!-- S1: YOLOv11 → YOLO.pt (수직) -->
  <line x1="240" y1="600" x2="235" y2="813" stroke="#455A64" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowDown)"/>
  
  <!-- S2: Normalizer → mapping.json (Row 2 Pantry/Scaler 사이 틈 통과) -->
  <path d="M 510 600 Q 690 680 695 813" fill="none" stroke="#455A64" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowDown)"/>
  
  <!-- S3: Ranker → recipes.csv (Row 2 Pantry/Scaler 사이 틈 통과) -->
  <path d="M 780 600 Q 700 680 465 813" fill="none" stroke="#455A64" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowDown)"/>
  
  <!-- S4: Pantry → pantry.json (우하향 대각선, Row 2에서 출발) -->
  <path d="M 540 685 Q 730 750 925 813" fill="none" stroke="#455A64" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowDown)"/>
  
  <!-- S5: Scaler → recipes.csv (좌하향 대각선, Row 2에서 출발) -->
  <path d="M 840 685 Q 650 755 465 813" fill="none" stroke="#455A64" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowDown)"/>
  
  <!-- AI → Storage 라벨 (S2/S3/S4는 화살표 끝부분, S5는 화살표 시작부분에 배치) -->
  <!-- S1 라벨: S1 수직선(x=237) 왼쪽, y=700 근처 -->
  <rect x="130" y="690" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="177" y="704" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">S1. 가중치 로드</text>
  
  <!-- S5 라벨: Scaler 박스 하단 바로 아래 (S5 출발지 옆) -->
  <rect x="780" y="695" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="827" y="709" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">S5. CSV 조회</text>
  
  <!-- S3 라벨: S3 경로(y=755, x≈540) 왼쪽에 밀착 (오른쪽으로 15px 이동) -->
  <rect x="430" y="745" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="477" y="759" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">S3. CSV 로드</text>
  
  <!-- S2 라벨: mapping.json 도착지 위, 화살표 끝과 미세하게 분리 (위로 10px 이동) -->
  <rect x="650" y="775" width="95" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="697" y="789" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">S2. 매핑 조회</text>
  
  <!-- S4 라벨: pantry.json 도착지 위, 화살표 끝과 미세하게 분리 (위로 10px 이동) -->
  <rect x="870" y="775" width="100" height="20" rx="4" fill="#FFF" stroke="#CFD8DC" stroke-width="1"/>
  <text x="920" y="789" text-anchor="middle" font-size="11" fill="#37474F" font-weight="500">S4. staple 조회</text>
  
  <!-- Arrows: Storage → Docker → Infra -->
  <line x1="600" y1="923" x2="600" y2="927" stroke="#455A64" stroke-width="2"/>
  <line x1="600" y1="970" x2="600" y2="982" stroke="#455A64" stroke-width="2" marker-end="url(#arrowDown)"/>
  
  <!-- ============================================= -->
  <!-- Legend (최상단 레이어) -->
  <!-- ============================================= -->
  <g>
    <rect x="100" y="1110" width="1000" height="240" rx="12" fill="#FFF" stroke="#CFD8DC" stroke-width="1.5"/>
    <text x="130" y="1140" font-size="16" font-weight="700" fill="#263238">📖 데이터 흐름 범례 (Legend)</text>
    
    <!-- 실선 -->
    <line x1="130" y1="1165" x2="177" y2="1165" stroke="#455A64" stroke-width="2.5" marker-end="url(#arrowRight)"/>
    <text x="195" y="1170" font-size="13" fill="#37474F" font-weight="600">실선: 요청·응답 흐름 (Request Flow)</text>
    
    <!-- 점선 -->
    <line x1="130" y1="1195" x2="177" y2="1195" stroke="#455A64" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowRight)"/>
    <text x="195" y="1200" font-size="13" fill="#37474F" font-weight="600">점선: 저장소 접근 (Storage Access)</text>
    
    <!-- Layer 색상 범례 -->
    <text x="130" y="1235" font-size="14" font-weight="700" fill="#263238">계층별 색상</text>
    <rect x="130" y="1250" width="20" height="20" rx="4" fill="url(#clientGrad)" stroke="#1976D2"/>
    <text x="158" y="1265" font-size="12" fill="#37474F">Client (UI)</text>
    
    <rect x="260" y="1250" width="20" height="20" rx="4" fill="url(#appGrad)" stroke="#388E3C"/>
    <text x="288" y="1265" font-size="12" fill="#37474F">Application (API)</text>
    
    <rect x="430" y="1250" width="20" height="20" rx="4" fill="url(#aiGrad)" stroke="#7B1FA2"/>
    <text x="458" y="1265" font-size="12" fill="#37474F">AI Core (딥러닝)</text>
    
